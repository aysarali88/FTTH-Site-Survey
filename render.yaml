services:
  - type: web
    name: site-survey-pro
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_STORAGE_BUCKET
        value: survey-photos
      - key: VITE_ADMIN_PIN
        sync: false
